name: Local Configuration
version: 1.0.0
schema: v1
models:
  - name: GLM 4.7 Flash
    provider: openai
    model: glm-4.7-flash
    chatOptions:
      baseSystemMessage: "You are a helpful coding agent."
      baseAgentSystemMessage: "You are a systematic coding agent. Break down problems methodically."
      basePlanSystemMessage: "You are a planning agent. Create clear, actionable steps."
    apiBase: http://localhost:8080/v1
  - name: "Qwen 2.5 Coder 14B"
    provider: "openai"
    model: "Qwen2.5-Coder-14B"
    chatOptions:
      baseSystemMessage: "You are a helpful coding agent."
      baseAgentSystemMessage: "You are a systematic coding agent. Break down problems methodically."
      basePlanSystemMessage: "You are a planning agent. Create clear, actionable steps."
    apiBase: "http://127.0.0.1:8032"

roles:
  - chat
  - edit
  - apply
  - summarize
  - embed
  - rerank

  # 4. SÄKRAD: Lokala rättigheter med inbyggt integritetsskydd
permissions:
  allow:
    - "Read(*)"                
    - "Write(**/*)"            
    - "ViewFile(*)"            
    - "WorkspaceIndex(*)"
    - "Bash(dotnet*)"          # Tillåt endast dotnet-kommandon i terminalen (för att undvika skadliga kommandon)
    - "Web(*)"                 # Tillåt alla webbförfrågningar (för
  ask:
    - "Bash(*)"                # Frågar ALLTID innan AI:n kör terminalkommandon i Windows
  exclude:                     # FIXAT: Denna lista skyddar din maskin från data-läckor och frysningar
    - "**/.env"                # Blockera miljöfiler med lösenord
    - "**/*.pem"               # Blockera SSL/SSH-certifikat och privata nycklar
    - "**/bin/**"              # Blockera tunga kompilerade filer (sparar CPU/RAM)
    - "**/obj/**"              # Blockera tillfälliga byggobjekt (sparar CPU/RAM)
    - "**/node_modules/**"     # Blockera tunga webb-paket
    - "**/.git/**"             # Blockera versionshanteringsdata

capabilities:
  - tool_use

# Place this at the ROOT level of your config.yaml
contextProviders:
  - name: file         # For @File (individual files)
  - name: currentFile  # For @Current File (active editor tab)
  - name: folder       # For @Folder (sub-directories)
  - name: code         # For @Code (classes/functions)
  - name: codebase     # For @Codebase (vector indexing)
  - name: diff         # For @Git Diff (local changes)
  - name: terminal     # For @Terminal (terminal outputs)
  - name: search       # For @Search (ripgrep IDE search)
  - name: web          # For @Web (external web pages)
  - name: docs         # For @Docs (indexed documentation frameworks)

autoApprove:
  mode: all

rules:
  - |
    Autonomous Engineering Agent Rules:
    You are an elite local software engineering agent with total file system access.
    You are authorized to search, read, create, edit, and remove files inside the workspace.
    When instructed to change code or files, choose your tools immediately. 
    If you require external documentation or updated info from the internet, invoke the web tool.
  - ALWAYS build solution after making file changes, and solve all build errors before proceeding.
  - ALWAYS use the terminal tool to run tests and validate fixes.
  - NEVER make file changes without a clear plan and tool selection.
  - NEVER access files outside the workspace or sensitive files like .env or .pem.