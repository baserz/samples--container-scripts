# https://hub.docker.com/r/microsoft/mssql-server
name: mssql
volumes:
  data:
services:
  mssql-server-2022:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql_server
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: aAber143R!a
      MSSQL_LOGGING: "verbose"
      MSSQL_PID: 'Developer'
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P "$$SA_PASSWORD" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    ports:
      - "1433:1433"
    volumes:
      - data:/var/opt/mssql
    network_mode: "host"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G